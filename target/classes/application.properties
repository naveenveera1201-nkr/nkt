# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=nkt-api
server.port=8080
server.servlet.context-path=/

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/nktdb
spring.data.mongodb.database=nktdb

# ── JWT ───────────────────────────────────────────────────────────────────────
# Replace with a 256-bit Base64-encoded secret in production
jwt.secret=bm10LXNlY3JldC1rZXktZm9yLW5hbW1ha2FkYWl0aGVydS1hcGktMjAyNA==
jwt.expiration=900000
jwt.refresh-expiration=2592000000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.nkt.api=DEBUG
logging.level.org.springframework.security=INFO

# ── Multipart (delivery proof upload) ────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
